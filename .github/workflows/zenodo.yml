name: Archive stable release to Zenodo

# Quando pubblichi una Release STABILE (non prerelease) archivia il SORGENTE del
# tag come nuova versione su Zenodo (concept 20558706), via API deposizioni.
# Idempotente e non bloccante. Richiede il secret ZENODO_TOKEN (scope
# deposit:write + deposit:actions); se manca, lo script salta senza errore.
#
# Gira dal branch di DEFAULT (main) per l'evento `release`. Il sorgente viene
# preso dal tag della release; .zenodo.json e lo script vengono presi da main
# (canonici), cosi' funziona anche se quel tag non li contiene ancora.

on:
  release:
    types: [published]

jobs:
  zenodo:
    # solo release stabili (le prerelease, incluse le *.dev*, vengono ignorate)
    if: ${{ !github.event.release.prerelease }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ github.event.release.tag_name }}
          fetch-depth: 0

      - name: Prepare source archive + canonical metadata/script
        run: |
          TAG="${{ github.event.release.tag_name }}"
          git archive --format=zip --prefix="s3Dgraphy-${TAG}/" HEAD -o "s3Dgraphy-${TAG}.zip"
          git fetch origin main --depth=1 -q
          git checkout origin/main -- .zenodo.json scripts/zenodo_publish.py
          ls -la "s3Dgraphy-${TAG}.zip" .zenodo.json scripts/zenodo_publish.py

      - name: Publish source to Zenodo
        env:
          ZENODO_TOKEN: ${{ secrets.ZENODO_TOKEN }}
          ZENODO_CONCEPT: "20558706"
          TAG: ${{ github.event.release.tag_name }}
          SRC_ZIP: "s3Dgraphy-${{ github.event.release.tag_name }}.zip"
        run: python3 scripts/zenodo_publish.py
