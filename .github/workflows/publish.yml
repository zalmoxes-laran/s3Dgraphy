name: Publish to PyPI

# Pubblicazione SOLO manuale: Actions > "Publish to PyPI" > Run workflow.
# (Nessun trigger automatico su release: il publish su PyPI lo si fa a mano.)

on:
  workflow_dispatch:
    inputs:
      target:
        description: 'Where to publish'
        required: true
        default: 'testpypi'
        type: choice
        options:
        - testpypi
        - pypi
      version_tag:
        description: 'Git tag to publish (e.g., v0.1.1)'
        required: true
        type: string

jobs:
  manual-publish:
    if: github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
    - name: Checkout specific tag
      uses: actions/checkout@v4
      with:
        ref: ${{ github.event.inputs.version_tag }}

    - name: Set up Python
      uses: actions/setup-python@v4
      with:
        python-version: '3.9'

    - name: Confirm target
      run: |
        echo "🎯 Publishing to: ${{ github.event.inputs.target }}"
        echo "🏷️ Using tag: ${{ github.event.inputs.version_tag }}"

    - name: Install build dependencies
      run: |
        python -m pip install --upgrade pip
        pip install build twine wheel

    - name: Build package
      run: |
        python -m build

    - name: Check package
      run: |
        python -m twine check dist/*

    - name: Publish to TestPyPI
      if: github.event.inputs.target == 'testpypi'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        repository-url: https://test.pypi.org/legacy/
        password: ${{ secrets.TEST_PYPI_API_TOKEN }}
        skip-existing: true

    - name: Publish to PyPI (PRODUCTION)
      if: github.event.inputs.target == 'pypi'
      uses: pypa/gh-action-pypi-publish@release/v1
      with:
        password: ${{ secrets.PYPI_API_TOKEN }}
