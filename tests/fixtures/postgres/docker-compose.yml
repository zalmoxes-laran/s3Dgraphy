# Local PostgreSQL for s3dgraphy PG-backend test runs.
#
# Usage:
#   docker compose -f tests/fixtures/postgres/docker-compose.yml up -d
#   export PYTEST_PG_DSN="postgresql://s3dgraphy@127.0.0.1:55432/s3dgraphy_test"
#   pytest tests/test_pg_importer.py
#   docker compose -f tests/fixtures/postgres/docker-compose.yml down
#
# Bound to 127.0.0.1 only — never reachable from the host network.
# Port 55432 (non-standard) is used so the container doesn't collide
# with any PostgreSQL the developer already runs on :5432.
#
# Auth: POSTGRES_HOST_AUTH_METHOD=trust — no password is checked.
# This is acceptable ONLY because:
#   1. the listener is bound to 127.0.0.1 (loopback), and
#   2. the container is ephemeral (you bring it up for tests, tear it
#      down right after).
# Do NOT copy this file into a production deployment.

services:
  postgres:
    image: postgres:16-alpine
    container_name: s3dgraphy_test_pg
    environment:
      POSTGRES_USER: s3dgraphy
      POSTGRES_DB: s3dgraphy_test
      # Local-only ephemeral test container — see header comment.
      POSTGRES_HOST_AUTH_METHOD: trust
    ports:
      - "127.0.0.1:55432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U s3dgraphy -d s3dgraphy_test"]
      interval: 2s
      timeout: 5s
      retries: 10
